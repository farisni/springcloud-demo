server:
  port: 8080

# ==========================================
# Redis 插件 — 配置此段即可启用
# ==========================================
spring:
  data:
    redis:
      host: localhost
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# ==========================================
# MyBatis-Plus 插件 — 如需启用，取消注释以下配置
# 同时删除上方 autoconfigure.exclude 段落
